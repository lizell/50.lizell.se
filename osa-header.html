<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<title>OSA-header</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,600&family=Hanken+Grotesk:wght@600&display=swap">
<style>
  html, body { margin: 0; padding: 0; }
  body {
    width: 1600px; height: 400px;
    background: #F4E8D5;
    color: #1F2A44;
    font-family: "Hanken Grotesk", sans-serif;
    overflow: hidden;
    box-sizing: border-box;
    position: relative;
  }
  .meta-top, .meta-bot {
    position: absolute;
    left: 96px; right: 96px;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #3A465F;
    display: flex;
    justify-content: space-between;
  }
  .meta-top { top: 40px; }
  .meta-bot { top: 339px; }
  .meta-top .accent, .meta-bot .accent { color: #D04E1F; }
  .meta-top .accent::before, .meta-bot .accent::before { content: "● "; }
  .stack {
    position: absolute;
    left: 96px; top: 92px;
  }

  .word {
    font-family: "Bagel Fat One", serif;
    font-size: 140px;
    line-height: 0.95;
    color: #D04E1F;
    letter-spacing: -0.02em;
  }
  .sub {
    font-family: "Fraunces", serif;
    font-style: italic;
    font-weight: 600;
    font-size: 48px;
    font-variation-settings: "opsz" 144;
    color: #1F2A44;
    line-height: 1;
    letter-spacing: -0.01em;
    margin: 4px 0 0 4px;
  }
  .info {
    margin: 12px 0 0 6px;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #3A465F;
  }
</style>
</head>
<body>
  <div class="meta-top">
    <span>Chrille fyllde 50</span>
    <span class="accent">Garden Party</span>
  </div>

  <div class="stack">
    <div class="word">OSA</div>
    <div class="sub">senast 24 maj</div>
    <div class="info">13 juni · Presidentvägen 1 · kl. 18 · 50.lizell.se</div>
  </div>
</body>
</html>
