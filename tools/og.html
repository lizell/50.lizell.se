<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<title>OG image</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,600&family=Hanken+Grotesk:wght@600&display=swap">
<style>
  html, body { margin: 0; padding: 0; }
  body {
    width: 1200px; height: 630px;
    background: #F4E8D5;
    color: #1F2A44;
    font-family: "Hanken Grotesk", sans-serif;
    overflow: hidden;
    position: relative;
  }
  .meta-top {
    position: absolute;
    left: 80px; right: 80px; top: 64px;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #3A465F;
    display: flex;
    justify-content: space-between;
  }
  .meta-top .accent { color: #D04E1F; }
  .meta-top .accent::before { content: "● "; }

  .stack { position: absolute; left: 80px; top: 168px; }
  .word {
    font-family: "Bagel Fat One", serif;
    font-size: 196px;
    line-height: 0.92;
    color: #D04E1F;
    letter-spacing: -0.02em;
  }
  .sub {
    font-family: "Fraunces", serif;
    font-style: italic;
    font-weight: 600;
    font-size: 78px;
    font-variation-settings: "opsz" 144;
    color: #1F2A44;
    line-height: 1;
    margin: 6px 0 0 8px;
    letter-spacing: -0.01em;
  }
  .info {
    margin: 26px 0 0 8px;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #3A465F;
  }
</style>
</head>
<body>
  <div class="meta-top">
    <span>13 juni 2026 · Presidentvägen 1, kl. 18</span>
    <span class="accent">Tema: Nina Lizell</span>
  </div>

  <div class="stack">
    <div class="word">Chrille</div>
    <div class="word" style="color:#1F2A44;">fyllde 50</div>
    <div class="sub">Garden Party</div>
  </div>
</body>
</html>
